<style>
  :root{
    --paper:#f1ede3; --paper-2:#e9e4d6; --ink:#1b1a16; --ink-soft:#52503f;
    --line:#c9c2af; --line-strong:#9b937c; --accent:#1f3d5c;
    --grid:rgba(120,112,90,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{font-family:"IBM Plex Sans JP",system-ui,sans-serif;color:var(--ink);
    background:linear-gradient(var(--grid) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid) 1px,transparent 1px),var(--paper);
    background-size:24px 24px,24px 24px,auto;line-height:1.75;padding:0 18px 80px}
  .wrap{max-width:680px;margin:0 auto}
  .breadcrumb{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.08em;color:var(--ink-soft);padding:26px 0 0}
  .breadcrumb a{color:var(--accent);text-decoration:none}
  .breadcrumb a:hover{text-decoration:underline}
  header{padding:26px 0 24px;border-bottom:2px solid var(--ink);margin-bottom:30px}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;
    color:var(--ink-soft);display:flex;gap:14px;align-items:center}
  .eyebrow::before{content:"";width:34px;height:2px;background:var(--accent);display:inline-block}
  h1{font-family:"Archivo","IBM Plex Sans JP",sans-serif;font-weight:900;
    font-size:clamp(26px,5.5vw,38px);line-height:1.1;letter-spacing:-.01em;margin:14px 0 0}
  .intro{font-size:14.5px;color:#33312a;margin:9px 0 4px}
  form{margin-top:24px}
  .field{margin-bottom:18px}
  label{display:block;font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  label .req{color:var(--accent)}
  input,textarea{width:100%;font-family:"IBM Plex Sans JP",sans-serif;font-size:15px;color:var(--ink);
    background:var(--paper-2);border:1.5px solid var(--line-strong);padding:11px 13px;border-radius:0}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:2px 2px 0 var(--accent)}
  textarea{min-height:150px;resize:vertical;line-height:1.6}
  button{font-family:"IBM Plex Mono",monospace;font-size:13px;letter-spacing:.12em;text-transform:uppercase;
    font-weight:600;color:var(--paper);background:var(--ink);border:1.5px solid var(--ink);
    padding:13px 26px;cursor:pointer;box-shadow:4px 4px 0 rgba(27,26,22,.18);transition:transform .12s ease,box-shadow .12s ease}
  button:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--accent)}
  .mailbox{background:var(--paper-2);border:1.5px solid var(--line-strong);padding:24px 22px;margin-top:24px;
    box-shadow:4px 4px 0 rgba(27,26,22,.10)}
  .mailbox .mb-label{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--ink-soft)}
  .mailbox .mb-addr{display:inline-block;margin-top:8px;font-family:"IBM Plex Mono",monospace;
    font-size:clamp(18px,4.5vw,24px);font-weight:500;color:var(--accent);text-decoration:none;word-break:break-all}
  .mailbox .mb-addr:hover{text-decoration:underline}
  .mailbox .mb-note{font-size:13.5px;color:#413f37;line-height:1.7;margin-top:14px}
  footer{margin-top:54px;border-top:2px solid var(--ink);padding-top:18px;
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-soft);letter-spacing:.04em;line-height:1.9}
  footer nav a{color:var(--accent);text-decoration:none;margin-right:16px}
  footer nav a:hover{text-decoration:underline}
  footer .disc{color:var(--line-strong);max-width:78ch;margin-top:10px;font-size:10.5px;line-height:1.65;display:block}
</style>
</head>
<body>
<div class="wrap">

  <nav class="breadcrumb"><a href="../">機械設計 計算ツール集</a> ／ お問い合わせ</nav>

  <header>
    <div class="eyebrow">Contact</div>
    <h1>お問い合わせ</h1>
  </header>

  <p class="intro">ツールに関するご質問、数値の誤りのご指摘、機能のご要望、お仕事のご依頼など、お気軽にご連絡ください。いただいた内容には、できる範囲で順次お返事します。</p>

  <div class="mailbox">
    <span class="mb-label">Email</span><br>
    <a class="mb-addr" href="mailto:designodaka@gmail.com">designodaka@gmail.com</a>
    <p class="mb-note">上記アドレス宛に、メールソフトから直接ご連絡ください。お名前（ハンドルネーム可）とお問い合わせ内容をご記入いただけるとスムーズです。</p>
  </div>

  <footer>
    機械設計 計算ツール集 ｜ Mechanical Design Calculation Tools

      <a href="../">ホーム</a>
      <a href="../about/">運営者情報</a>
      <a href="../privacy/">プライバシーポリシー</a>
      <a href="../contact/">お問い合わせ</a>
    </nav>
  </footer>

</div>
</body>
</html>
